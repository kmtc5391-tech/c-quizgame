<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉语 단어 퀴즈</title>
    <style>
        :root {
            --primary: #d32f2f; /* 중국 느낌의 진한 레드 */
            --secondary: #fdf2f2;
            --success: #2e7d32;
            --error: #c62828;
            --text: #2c3e50;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        #game-container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            text-align: center;
        }

        .hidden { display: none !important; }

        /* Header UI */
        .progress-container { font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        .score-display { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: var(--primary); }
        
        /* Question Section */
        .question-card h2 { font-size: 3.5rem; margin: 30px 0; color: #1a1a1a; }
        
        /* Buttons */
        .options-grid { display: grid; gap: 12px; margin-top: 25px; }
        .btn {
            padding: 16px;
            font-size: 1.1rem;
            border: 2px solid #edf2f7;
            border-radius: 16px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .btn:hover:not(:disabled) { background: var(--secondary); border-color: var(--primary); }
        .btn.correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .btn.wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }

        /* Input & Ranking */
        input[type="text"] {
            width: 85%;
            padding: 14px;
            margin: 20px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

.rank-item {
    display: flex;
    justify-content: space-between;
    align-items: center; /* 세로 가운데 정렬 */
    padding: 15px 12px;  /* 간격을 조금 더 넓게 */
    border-bottom: 1px solid #f1f1f1;
    font-size: 1.05rem;  /* 글씨 크기 살짝 키움 */
}

/* 1등은 배경색을 살짝 다르게 하고 싶다면 추가 */
.rank-item:first-child {
    background-color: #fff9e6; 
    border-radius: 10px;
}
        .rank-list {
    margin-top: 25px;
    border-top: 2px solid #f1f1f1;
    padding-top: 15px;
    max-height: 300px; /* 랭킹 창의 최대 높이 설정 */
    overflow-y: auto;  /* 인원이 많아지면 스크롤바 생기게 함 */
    text-align: left;
}

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .action-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 시작 화면 -->
    <div id="start-screen">
        <h1 style="font-size: 2.5rem; color: var(--primary);">汉语<br>단어 퀴즈</h1>
        <p style="color: #666; margin-bottom: 40px;">50개의 단어 중 10문제가 출제됩니다.<br>최고 점수에 도전하세요!</p>
        <button class="action-btn" onclick="startGame()">도전 시작</button>
    </div>

    <!-- 게임 화면 -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container">QUESTION <span id="current-idx">1</span> / 10</div>
        <div class="score-display">SCORE: <span id="current-score">0</span></div>
        <div class="question-card">
            <h2 id="chinese-word">你好</h2>
            <div class="options-grid" id="options"></div>
        </div>
    </div>

    <!-- 결과/저장 화면 -->
    <div id="result-screen" class="hidden">
        <h2 style="font-size: 2rem;">Game Over!</h2>
        <p style="font-size: 1.2rem;">당신의 점수는 <strong id="final-score" style="color:var(--primary)">0</strong>점입니다.</p>
        <input type="text" id="nickname" placeholder="랭킹에 등록할 닉네임" maxlength="10">
        <button class="action-btn" id="save-btn" onclick="saveScore()">점수 저장 및 랭킹 확인</button>
    </div>

    <!-- 랭킹 화면 -->
    <div id="rank-screen" class="hidden">
        <h2 style="color: gold;">🏆 실시간 TOP 3</h2>
        <div id="rank-board" class="rank-list"></div>
        <button class="action-btn" onclick="location.reload()" style="margin-top: 25px; background: #333;">다시 하기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // [필독] 아래에 본인의 Firebase 설정을 복사해서 붙여넣으세요!
    const firebaseConfig = {
  apiKey: "AIzaSyA4WFog5m4iPtWwHGkRQuPmTmWL9Z4Dj14",
  authDomain: "c-quiz-game.firebaseapp.com",
  projectId: "c-quiz-game",
  storageBucket: "c-quiz-game.firebasestorage.app",
  messagingSenderId: "888249330594",
  appId: "1:888249330594:web:760d7830cfd6f76b09a0fb"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 단어 데이터베이스 (총 50개)
    const wordPool = [
        { c: "你好", e: "안녕하세요" }, { c: "谢谢", e: "고맙습니다" }, { c: "再见", e: "작별하다" }, { c: "对不起", e: "미안합니다" }, { c: "没关系", e: "괜찮습니다" },
        { c: "老师", e: "선생님" }, { c: "学生", e: "학생" }, { c: "医生", e: "의사" }, { c: "朋友", e: "친구" }, { c: "名字", e: "이름" },
        { c: "什么", e: "무엇" }, { c: "多少", e: "얼마" }, { c: "天气", e: "날씨" }, { c: "时间", e: "시간" }, { c: "衣服", e: "옷" },
        { c: "苹果", e: "사과" }, { c: "西瓜", e: "수박" }, { c: "咖啡", e: "커피" }, { c: "面包", e: "빵" }, { c: "吃饭", e: "식사하다" },
        { c: "喝水", e: "물을 마시다" }, { c: "喜欢", e: "좋아하다" }, { c: "看书", e: "책을 보다" }, { c: "写字", e: "글씨를 쓰다" }, { c: "学习", e: "공부하다" },
        { c: "漂亮", e: "예쁘다" }, { c: "高兴", e: "기쁘다" }, { c: "认识", e: "알다/인식하다" }, { c: "现在", e: "지금" }, { c: "今天", e: "오늘" },
        { c: "明天", e: "내일" }, { c: "昨天", e: "어제" }, { c: "电影", e: "영화" }, { c: "电视", e: "티브이" }, { c: "电脑", e: "컴퓨터" },
        { c: "手机", e: "휴대폰" }, { c: "学校", e: "학교" }, { c: "商店", e: "상점" }, { c: "医院", e: "병원" }, { c: "饭店", e: "식당" },
        { c: "中国", e: "중국" }, { c: "韩国", e: "한국" }, { c: "名字", e: "이름" }, { c: "岁", e: "나이/살" }, { c: "家", e: "집" },
        { c: "多", e: "많다" }, { c: "少", e: "적다" }, { c: "大", e: "크다" }, { c: "小", e: "작다" }, { c: "好", e: "좋다" }
    ];

    let quizData = [];
    let currentIndex = 0;
    let score = 0;
    let canClick = true;

    window.startGame = () => {
        // 50개 중 랜덤으로 10개 추출
        quizData = [...wordPool].sort(() => 0.5 - Math.random()).slice(0, 10);
        currentIndex = 0;
        score = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    };

    function showQuestion() {
        canClick = true;
        const current = quizData[currentIndex];
        document.getElementById('current-idx').innerText = currentIndex + 1;
        document.getElementById('current-score').innerText = score;
        document.getElementById('chinese-word').innerText = current.c;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        // 오답 3개 + 정답 1개 섞기
        let wrongs = wordPool.filter(w => w.e !== current.e)
                             .sort(() => 0.5 - Math.random())
                             .slice(0, 3);
        let choices = [...wrongs, current].sort(() => 0.5 - Math.random());

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = choice.e;
            btn.onclick = () => checkAnswer(btn, choice.e === current.e);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, isCorrect) {
        if (!canClick) return;
        canClick = false;

        if (isCorrect) {
            btn.classList.add('correct');
            score += 10;
        } else {
            btn.classList.add('wrong');
            Array.from(document.querySelectorAll('.btn')).forEach(b => {
                if(b.innerText === quizData[currentIndex].e) b.classList.add('correct');
            });
        }

        setTimeout(() => {
            currentIndex++;
            if (currentIndex < 10) showQuestion();
            else showResult();
        }, 1200);
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    window.saveScore = async () => {
        const nickname = document.getElementById('nickname').value.trim();
        if (!nickname) return alert('닉네임을 입력해주세요!');

        const saveBtn = document.getElementById('save-btn');
        saveBtn.disabled = true;
        saveBtn.innerText = "저장 중...";

        try {
            await addDoc(collection(db, "scores"), {
                nickname: nickname,
                score: score,
                timestamp: serverTimestamp()
            });
            showRanking();
        } catch (e) {
            console.error(e);
            alert("저장 실패!");
            saveBtn.disabled = false;
        }
    };

   async function showRanking() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('rank-screen').classList.remove('hidden');
        const board = document.getElementById('rank-board');
        board.innerHTML = "순위를 불러오는 중...";

        // 전체 데이터를 가져오도록 limit 제거 (필요시 다시 추가 가능)
        const q = query(collection(db, "scores"), orderBy("score", "desc"));
        const querySnapshot = await getDocs(q);
        
        board.innerHTML = '';
        let rank = 1;
        
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const item = document.createElement('div');
            item.className = 'rank-item';
            
            // 등수에 따른 메달 이모지 설정
            let medal = "";
            if (rank === 1) medal = "🥇 ";
            else if (rank === 2) medal = "🥈 ";
            else if (rank === 3) medal = "🥉 ";
            else medal = ""; // 4등부터는 이모지 없음

            // 닉네임을 <strong> 태그로 감싸 두껍게 처리
            item.innerHTML = `
                <span>
                    <b style="color:#888; margin-right:10px;">${rank}위</b>
                    ${medal}<strong>${data.nickname}</strong>
                </span>
                <span style="font-weight: bold; color: var(--primary);">${data.score}점</span>
            `;
            board.appendChild(item);
            rank++;
        });
    }
 </script>
</body>
</html>
